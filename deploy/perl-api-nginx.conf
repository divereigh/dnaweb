# nginx snippet for the dnaweb Perl API.
#
# Include from the main genealogy.launtel.net.au server { } block,
# e.g. by `include /etc/nginx/snippets/dnaweb-perl-api.conf;`
# inside the server block. Or copy these directives inline.
#
# Restrict to 127.0.0.1 so only the local Laravel app (which lives
# on the same box) can reach the API. The Mojo app has its own
# remote_address guard too — defence in depth.

location /api/perl/ {
    allow 127.0.0.1;
    deny  all;

    # Strip the /api/perl prefix so Mojo sees /parse-url, not
    # /api/perl/parse-url. Mojo's `under '/api/perl'` guard still
    # works because the path it routes against is the full URI,
    # not the proxy-stripped portion — Mojo sees the URI from
    # X-Forwarded-* etc. only if we send them. To keep that guard
    # simple we DO send the full URI through with the prefix.
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Most Perl-API calls are sub-second. 30s caps any single Ancestry
    # round trip the API makes downstream.
    proxy_read_timeout 30s;
}
